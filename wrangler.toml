name = "okome-pr"
main = "worker/index.js"
compatibility_date = "2026-03-31"

[assets]
directory = "."
binding = "ASSETS"

account_id = "c61f1a6c2cde4a43f023be0395777b89"
workers_dev = true

# Non-secret Worker vars:
# Put only non-secret values here or in the Cloudflare dashboard Variables UI.
[vars]
SUPABASE_URL = "https://vebwzvnfocugswxtrwor.supabase.co"
DISCORD_REDIRECT_URI = "https://okome-pr.orshouldempty.workers.dev/api/admin/discord/callback"
DISCORD_GUILD_ID = "1458712723570294889"
DISCORD_REVIEW_ROLE_IDS = "1488213161235709973"

# Cloudflare Secrets Store bindings:
# Create the account secret first, then bind it to the Worker using the same
# binding name and secret name shown below. Docs:
# https://developers.cloudflare.com/secrets-store/integrations/workers/

[[secrets_store_secrets]]
binding = "ADMIN_SESSION_SECRET"
store_id = "baef96de25a647d29def391192f7a929"
secret_name = "ADMIN_SESSION_SECRET"

[[secrets_store_secrets]]
binding = "ADMIN_GATE_PASSWORD"
store_id = "baef96de25a647d29def391192f7a929"
secret_name = "ADMIN_GATE_PASSWORD"

[[secrets_store_secrets]]
binding = "DISCORD_CLIENT_ID"
store_id = "baef96de25a647d29def391192f7a929"
secret_name = "DISCORD_CLIENT_ID"

[[secrets_store_secrets]]
binding = "DISCORD_CLIENT_SECRET"
store_id = "baef96de25a647d29def391192f7a929"
secret_name = "DISCORD_CLIENT_SECRET"

[[secrets_store_secrets]]
binding = "SUPABASE_SERVICE_ROLE_KEY"
store_id = "baef96de25a647d29def391192f7a929"
secret_name = "SUPABASE_SERVICE_ROLE_KEY"

[[secrets_store_secrets]]
binding = "APPLICANT_LOOKUP_SECRET"
store_id = "baef96de25a647d29def391192f7a929"
secret_name = "APPLICANT_LOOKUP_SECRET"

